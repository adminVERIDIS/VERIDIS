{% macro render(headers, rows, empty_label="Aucune donnee disponible") -%}
<table class="data-table">
  <thead>
    <tr>
      {% for header in headers %}
      <th scope="col">{{ header }}</th>
      {% endfor %}
    </tr>
  </thead>
  <tbody>
    {% for row in rows %}
    <tr>
      {% for cell in row %}
      <td>{{ cell }}</td>
      {% endfor %}
    </tr>
    {% else %}
    <tr>
      <td colspan="{{ headers|length }}" class="data-table__empty">{{ empty_label }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{%- endmacro %}
