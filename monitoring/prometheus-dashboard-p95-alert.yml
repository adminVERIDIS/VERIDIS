groups:
  - name: veridis-dashboard-slo
    rules:
      - alert: VeridisDashboardQueryP95Slow
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (
              rate(veridis_dashboard_query_duration_seconds_bucket{query="dashboard_esrs"}[5m])
            )
          ) > 0.1
        for: 5m
        labels:
          severity: page
          service: veridis
          slo: dashboard-query-p95
        annotations:
          summary: "VERIDIS dashboard query p95 is above 100 ms"
          description: "dashboard_esrs p95 exceeded 100 ms for 5 minutes. Check pg_stat_statements, buffers, index-only scans, and recent table growth."
